<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Ferretería Don Toño</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Fondo degradado moderno en sintonía con el registro */
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            max-width: 450px;
            width: 100%;
            padding: 2.5rem;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        }
        .input-group-text {
            background-color: #f8f9fa;
            color: #6c757d;
        }
    </style>
</head>
<body>

    <div class="login-card m-3">
        <div class="text-center mb-4">
            <div class="text-primary display-4 mb-2">
                <i class="fa-solid fa-circle-user"></i>
            </div>
            <h3 class="fw-bold text-dark">Bienvenido</h3>
            <p class="text-muted small">Ferretería Don Toño</p>
        </div>

        <form method="POST" action="php/login.php">  
            
            <div class="mb-3"> 
                <label for="floatingInput" class="form-label fw-semibold text-secondary">Correo electrónico</label>  
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com" name="correo" required>
                </div>
            </div> 

            <div class="mb-4"> 
                <label for="floatingPassword" class="form-label fw-semibold text-secondary">Contraseña</label>  
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control" id="floatingPassword" placeholder="Introduce tu contraseña" name="password" required>
                </div>
            </div> 

            <div class="d-grid gap-2">
                <button class="btn btn-primary btn-lg rounded-pill fw-bold shadow-sm" type="submit">
                    <i class="fa-solid fa-right-to-bracket me-2"></i>Ingresar
                </button> 
            </div>

            <div class="text-center mt-4">
                <p class="small text-muted">¿No tienes una cuenta? <a href="register.html" class="text-decoration-none fw-semibold">Regístrate aquí</a></p>
                <p class="text-muted mb-0" style="font-size: 0.75rem;">© 2026 Ferretería Don Toño</p> 
            </div>
           
        </form> 
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
